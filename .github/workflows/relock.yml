name: relock

on:
  workflow_dispatch:
  issue_comment:

jobs:
  test:
    runs-on: ubuntu-latest
    name: test
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: run
        uses: conda-incubator/relock-conda@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          git-user-name: '@@GIT_USER_NAME@@'

