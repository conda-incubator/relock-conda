name: relock

on:
  workflow_dispatch:
  issue_comment:

jobs:
  test:
    runs-on: ubuntu-latest
    name: test
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: run
        uses: conda-incubator/relock-conda@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          git-user-name: '@@GIT_USER_NAME@@'

